version: 2
ethernets:
  eth0:
    match:
      macaddress: "52:54:00:ab:cd:ef"
    set-name: eth0
    addresses:
      - 192.0.2.10/24
    gateway4: 192.0.2.1
vlans:
  vlan10:
    id: 10
    link: eth0
    dhcp4: true
  vlan20:
    id: 20
    link: eth0
    addresses:
      - 10.20.0.5/24
    gateway4: 10.20.0.1
