version: 1
config:
  - type: physical
    name: eth0
    mac_address: "52:54:00:ab:cd:ef"
    subnets:
      - type: static
        address: 192.0.2.10
        netmask: 255.255.255.0
        gateway: 192.0.2.1
        dns_nameservers:
          - 192.0.2.53
          - 8.8.8.8
        dns_search:
          - example.com
          - local
  - type: physical
    name: eth1
    mac_address: "52:54:00:11:22:33"
    subnets:
      - type: static
        address: 10.0.0.5
        netmask: 255.255.0.0
        gateway: 10.0.0.1
        dns_nameservers:
          - 10.0.0.53
